  http: ^1.3.0
  cookie_jar: ^4.0.3
  localization: ^2.1.0
  line_icons: ^2.0.1
  uuid: ^4.0.0
  pdf: ^3.8.4
  open_file: ^3.3.1
  path_provider: ^2.0.14
  intl: ^0.20.0
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.0.17
  flutter_platform_alert: ^0.7.0
  keyboard_actions: ^4.2.0
  jwt_decode: ^0.3.1
  provider: ^6.0.5
  responsive_table: ^0.2.0+2
  anim_search_bar: ^2.0.3
  readmore: ^3.0.0
  animate_icons: ^2.0.0
  syncfusion_flutter_signaturepad: ^28.2.12
  image_picker: ^1.0.4
  flutter_html: ^3.0.0-alpha.6
  flutter_downloader: ^1.10.2
  dio: ^5.1.1
  permission_handler: ^11.3.1
  universal_html: ^2.2.1
  url_launcher: ^6.1.10
  datetime_picker_formfield_new: ^2.1.0
  device_info_plus: ^11.3.3
  mobile_scanner: ^7.2.0
  mime: ^2.0.0
  video_player: ^2.7.0
  sweet_cookie_jar: ^1.1.0
  omni_datetime_picker: ^2.1.1
  csv: ^6.0.0
  data_table_2: ^2.5.8
  file_picker: ^9.2.1
  flutter_typeahead: ^5.2.0
  dropdown_textfield: ^1.0.8
  textfield_search: ^0.11.1
  search_choices: ^2.2.7
  flutster: ^1.0.4
  flutter_cache_manager: ^3.3.1
